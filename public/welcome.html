<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0f0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Minorum</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500&display=swap"
    rel="stylesheet"
  />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100dvh;
      min-height: 100svh;
      display: grid;
      place-items: center;
      background: #0f0f0f;
      color: #ffffff;
      font-family: "IBM Plex Sans", ui-sans-serif, system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      padding: max(1.5rem, env(safe-area-inset-top, 0px))
        max(1.5rem, env(safe-area-inset-right, 0px))
        max(1.5rem, env(safe-area-inset-bottom, 0px))
        max(1.5rem, env(safe-area-inset-left, 0px));
      text-align: center;
    }
    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      width: 100%;
      max-width: 22rem;
    }
    img {
      width: 56px;
      height: 56px;
      border-radius: 12px;
      object-fit: cover;
    }
    .copy {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    h1 {
      font-family: "Geist", "IBM Plex Sans", ui-sans-serif, system-ui, sans-serif;
      font-size: 24px;
      line-height: 1.2;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #ffffff;
    }
    p {
      font-size: 16px;
      line-height: 1.5;
      font-weight: 400;
      color: #a3a3a3;
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      width: 100%;
      margin-top: 0.5rem;
    }
    input {
      width: 100%;
      height: 44px;
      border-radius: 7px;
      border: 1px solid #1f1f1f;
      background: #171717;
      color: #ffffff;
      font: inherit;
      font-size: 16px;
      padding: 0 12px;
      outline: none;
      text-align: center;
    }
    input:focus {
      border-color: #262626;
    }
    input::placeholder {
      color: #737373;
    }
    button {
      height: 44px;
      margin-top: 0.5rem;
      border: 0;
      border-radius: 7px;
      background: #e5e5e5;
      color: #0f0f0f;
      font: inherit;
      font-size: 13px;
      cursor: pointer;
    }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: default; }
    .toast-host {
      position: fixed;
      inset: 0 0 auto 0;
      z-index: 100;
      display: flex;
      justify-content: center;
      padding: max(0.75rem, env(safe-area-inset-top, 0px)) 1rem 0;
      pointer-events: none;
    }
    .toast {
      max-width: 28rem;
      border: 1px solid #1f1f1f;
      border-radius: 10px;
      background: #171717;
      color: #ffffff;
      font-size: 14px;
      line-height: 1.45;
      padding: 12px 16px;
      box-shadow: 0 8px 24px rgb(0 0 0 / 0.35);
      opacity: 0;
      transform: translateY(-0.5rem);
      transition: opacity 200ms, transform 200ms;
      pointer-events: auto;
    }
    .toast.is-visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="toast-host" aria-live="assertive">
    <div class="toast" id="toast" role="alert" hidden></div>
  </div>
  <main>
    <img src="/logo.jpeg" alt="Minorum" width="56" height="56" />
    <div class="copy">
      <h1>Lost in Space?</h1>
      <p>Log in to find your way back.</p>
    </div>
    <form id="gate" autocomplete="on">
      <input
        id="full-name"
        name="full-name"
        type="text"
        placeholder="Your Name"
        required
        autofocus
        autocomplete="name"
      />
      <input
        id="password"
        name="password"
        type="password"
        placeholder="Password"
        required
        autocomplete="current-password"
      />
      <button type="submit" id="login" disabled>Login</button>
    </form>
  </main>
  <script>
    const TOAST = {
      profile_required: "Enter your full name first",
      wrong_password: "Wrong password",
      connection_failed: "Connection failed",
      api_config_missing: "Server API config missing",
      timeout: "Request timed out",
      network: "Connection lost",
      unknown: "Something went wrong",
    };

    const STORAGE = {
      apiBaseUrl: "api_base_url",
      apiKey: "api_key",
      modelName: "model_name",
      fullName: "full_name",
    };

    const form = document.getElementById("gate");
    const fullName = document.getElementById("full-name");
    const password = document.getElementById("password");
    const toast = document.getElementById("toast");
    const button = document.getElementById("login");
    let toastTimer = null;

    function showToast(message) {
      const text = String(message || "").trim();
      if (!text) {
        return;
      }
      toast.textContent = text;
      toast.hidden = false;
      toast.classList.add("is-visible");
      if (toastTimer !== null) {
        window.clearTimeout(toastTimer);
      }
      toastTimer = window.setTimeout(() => {
        toast.classList.remove("is-visible");
        window.setTimeout(() => {
          toast.hidden = true;
          toast.textContent = "";
        }, 200);
      }, 4000);
    }

    function syncLoginEnabled() {
      button.disabled = password.value.trim().length === 0;
    }

    fullName.value = localStorage.getItem(STORAGE.fullName) || "";
    password.addEventListener("input", syncLoginEnabled);
    syncLoginEnabled();

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      if (password.value.trim().length === 0) {
        return;
      }
      button.disabled = true;
      const loginLabel = button.textContent;
      try {
        const name = fullName.value.trim();
        if (!name) {
          showToast(TOAST.profile_required);
          return;
        }

        button.textContent = "Loading…";
        const response = await fetch("/api/gate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password: password.value }),
          signal: AbortSignal.timeout(20000),
        });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok || payload.ok !== true) {
          const message =
            typeof payload.message === "string"
              ? payload.message
              : response.status === 401
                ? TOAST.wrong_password
                : TOAST.connection_failed;
          showToast(message);
          if (message === TOAST.wrong_password) {
            password.select();
          }
          return;
        }

        const config = payload.config || {};
        if (!config.apiBaseUrl || !config.apiKey) {
          showToast(TOAST.api_config_missing);
          return;
        }

        localStorage.setItem(STORAGE.apiBaseUrl, config.apiBaseUrl);
        localStorage.setItem(STORAGE.apiKey, config.apiKey);
        localStorage.setItem(
          STORAGE.modelName,
          typeof config.modelName === "string" ? config.modelName : "",
        );
        localStorage.setItem(STORAGE.fullName, name);

        window.location.href = "/";
      } catch (err) {
        showToast(
          err && err.name === "TimeoutError"
            ? TOAST.timeout
            : err instanceof Error && err.message
              ? err.message
              : TOAST.network,
        );
      } finally {
        button.textContent = loginLabel;
        syncLoginEnabled();
      }
    });
  </script>
</body>
</html>
